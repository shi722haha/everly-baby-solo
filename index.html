<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>宝宝喂养 · 每日作息</title>
<style>
  :root{ --ink:#2F3B37; --ink2:#9AA8A2; --line:#EAF1EE; --accent:#4FC0A1; --accent-deep:#34A98A; --accent-soft:#E6F7F1; --accent-line:#C3EADD; --mint:#F2F9F7; --blue:#6AA6DB; --blue-soft:#EAF3FB; --blue-line:#CFE3F4; --warn-soft:#FCEFE4; --warn-deep:#C26A33; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body{ margin:0; background:#E3ECE9; font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif; display:flex; justify-content:center; align-items:flex-start; min-height:100vh; padding:22px 16px; color:var(--ink); }
  .phone{ width:100%; max-width:390px; border-radius:44px; overflow:hidden; background:linear-gradient(180deg,#FCFEFD,#F1F9F6); box-shadow:0 22px 55px rgba(60,110,95,.20); display:flex; flex-direction:column; height:790px; position:relative; }
  .statusbar{ display:flex; justify-content:space-between; align-items:center; padding:15px 27px 0; font-size:13px; font-weight:600; color:#56635E; flex:none; } .statusbar .dots{ letter-spacing:1px; opacity:.5; font-size:11px; }
  .screen{ position:absolute; inset:0; top:34px; display:none; flex-direction:column; animation:fade .3s ease; } .screen.active{ display:flex; }
  @keyframes fade{ from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:none;} }
  .scroll{ flex:1; overflow-y:auto; padding:8px 20px 24px; }

  .hello{ font-size:13px; color:var(--ink2); margin:8px 2px 2px; } h2{ font-size:22px; margin:2px 2px 4px; font-weight:600; } .sub{ font-size:13px; color:var(--ink2); margin:0 2px 16px; }
  .band{ font-size:12px; font-weight:700; color:var(--accent-deep); margin:18px 2px 9px; }
  .pick{ display:flex; align-items:center; justify-content:space-between; background:#fff; border:1px solid var(--line); border-radius:16px; padding:15px 16px; margin-bottom:10px; cursor:pointer; box-shadow:0 4px 14px rgba(70,120,105,.05); }
  .pick:active{ transform:scale(.99); } .pick .pt{ font-size:15px; font-weight:700; } .pick .pd{ font-size:12px; color:var(--ink2); margin-top:3px; } .pick .arr{ font-size:22px; color:#C2BBB0; font-weight:300; }

  .backrow{ font-size:14px; color:var(--ink2); cursor:pointer; padding:4px 20px 2px; display:inline-flex; align-items:center; gap:5px; flex:none; } .backrow .ar{ font-size:18px; }
  .ov{ display:flex; gap:9px; margin-bottom:6px; }
  .ovc{ flex:1; background:#fff; border:1px solid var(--line); border-radius:14px; padding:11px 6px; text-align:center; box-shadow:0 3px 10px rgba(70,120,105,.05); }
  .ovc .v{ font-size:16px; font-weight:700; color:var(--accent-deep); } .ovc .l{ font-size:10.5px; color:var(--ink2); margin-top:2px; }

  .sechead{ font-size:13px; font-weight:700; color:#46504A; margin:18px 2px 10px; }
  .tl{ background:#fff; border:1px solid var(--line); border-radius:18px; padding:6px 16px; box-shadow:0 4px 14px rgba(70,120,105,.05); }
  .tlr{ display:flex; gap:13px; padding:11px 0; border-bottom:1px solid #F4F7F5; } .tlr:last-child{ border-bottom:none; }
  .tlr .tt{ width:46px; flex:none; font-size:13px; font-weight:700; color:#3B4742; }
  .tlr .td{ flex:1; font-size:13px; color:#46504A; line-height:1.5; } .tlr .td .tg{ font-size:11px; color:#AEBAB4; }
  .ml{ display:inline-block; font-size:12px; font-weight:700; color:var(--accent-deep); background:var(--accent-soft); border-radius:7px; padding:1px 8px; margin-left:4px; }
  .ic{ display:inline-block; width:18px; text-align:center; }

  .supp{ background:var(--blue-soft); border:1px solid var(--blue-line); border-radius:16px; padding:14px; }
  .supp .sh{ font-size:13px; font-weight:700; color:#3E6E97; margin-bottom:8px; }
  .supp .sr{ display:flex; gap:9px; align-items:flex-start; font-size:13px; color:#3E5160; padding:5px 0; line-height:1.5; } .supp .sr b{ color:#2C4B66; }

  .note{ font-size:12px; color:#9AA8A2; line-height:1.6; margin-top:14px; background:var(--mint); border-radius:12px; padding:11px 13px; }
  .covbox{ background:var(--accent-soft); border:1px solid var(--accent-line); border-radius:14px; padding:13px; font-size:12.5px; color:#3B4742; line-height:1.8; }
  .ncard{ background:#fff; border:1px solid var(--line); border-radius:18px; padding:6px 16px; box-shadow:0 4px 14px rgba(70,120,105,.05); }
  .nr{ display:flex; align-items:baseline; padding:7px 0; border-bottom:1px solid #F4F7F5; } .nr:last-child{ border-bottom:none; }
  .nr .nn{ flex:1; font-size:13px; color:#46504A; } .nr .nv{ font-size:13px; font-weight:700; color:#3B4742; } .nr .nu{ font-size:11px; color:#AEBAB4; margin-left:3px; font-weight:400; }
  .trace{ font-size:11px; color:#AAB4AE; padding:9px 0 3px; }
  .disc{ font-size:11px; color:#A98B6A; background:#FBF3EA; border:1px solid #F0E1CF; border-radius:11px; padding:9px 11px; line-height:1.55; margin:12px 2px 0; }
</style>
</head>
<body>
<div class="phone">
  <div class="statusbar"><span>9:41</span><span class="dots">● ● ● ●</span></div>

  <!-- 屏1:选月龄 -->
  <div class="screen active" id="home">
    <div class="scroll">
      <div class="hello">0–3 岁 · 每日喂养作息</div>
      <h2>选宝宝月龄</h2>
      <div class="sub">选一个,进去看这一天几点喂、喝多少、补剂几点吃。</div>
      <div id="list"></div>
      <div class="disc">⚠ 以下为**参考作息**(配方奶给参考 mL,母乳按需不必硬卡);奶量/作息按宝宝饥饱信号调整,具体以儿保医生为准。数值依据中国《婴幼儿喂养指南》+ DRIs 2023 框架,上线前以官方为准。</div>
    </div>
  </div>

  <!-- 屏2:这一天 -->
  <div class="screen" id="day">
    <div class="backrow" onclick="go('home')"><span class="ar">‹</span> 选月龄</div>
    <div class="scroll" id="dayBody"></div>
  </div>
</div>

<script>
const AGES = [
  { id:"m1", band:"0–6 月 · 纯奶", t:"1 月龄", d:"纯奶 · 约每 3 小时一次",
    ov:[["~630","mL 总奶"],["7","顿"],["—","辅食"]],
    tl:[ ["06:00","🍼","奶",90],["09:00","🍼","奶",90],["12:00","🍼","奶",90],["15:00","🍼","奶",90],["18:00","🍼","奶",90],["21:00","🍼","奶",90],["夜间","🍼","按需 1 次",90] ],
    supp:[ ["维生素 D","400 IU(10 µg)","每天 1 次,早上喂奶后"] ],
    note:"母乳按需喂,不必数 mL;配方奶按宝宝体重/月龄,饿了就喂、饱了别强迫。" },

  { id:"m3", band:"0–6 月 · 纯奶", t:"3 月龄", d:"纯奶 · 顿数减少、单顿变多",
    ov:[["~780","mL 总奶"],["6","顿"],["—","辅食"]],
    tl:[ ["06:30","🍼","奶",130],["09:30","🍼","奶",130],["12:30","🍼","奶",130],["15:30","🍼","奶",130],["18:30","🍼","奶",130],["21:30","🍼","奶",120] ],
    supp:[ ["维生素 D","400 IU(10 µg)","每天 1 次"] ],
    note:"夜间觉变长是正常的,别刻意叫醒喂。" },

  { id:"m6", band:"0–6 月 · 纯奶", t:"6 月龄", d:"奶为主 + 开始第一口辅食",
    ov:[["~780","mL 总奶"],["5–6","顿奶"],["1","次辅食"]],
    tl:[ ["07:00","🍼","母乳 / 配方奶",180],["10:00","🍼","奶",180],["12:00","🥄","强化铁米粉 2 勺(用奶调稀)+ 南瓜泥 1 勺",0],["12:30","🍼","奶",120],["15:30","🍼","奶",180],["18:30","🍼","奶",180],["21:00","🍼","睡前奶",180] ],
    supp:[ ["维生素 D","400 IU(10 µg)","每天 1 次"],["铁","从辅食补","第一口优先强化铁,缺铁高危"] ],
    note:"辅食从一天一次、一两勺起步;先单一食材试 2–3 天再加新的;尽早少量引入易致敏食物。" },

  { id:"m9", band:"7–12 月 · 加辅食", t:"9 月龄", d:"奶 + 辅食 2 次 + 手指食物",
    ov:[["~700","mL 总奶"],["3–4","顿奶"],["2","次辅食"]],
    tl:[ ["07:00","🍼","起床奶",200],["10:00","🥄","胡萝卜瘦肉小米粥 约 100g + 蒸蛋黄 半个",0],["12:30","🍼","奶",180],["15:00","🍎","牛油果条 / 香蕉段(手指食物)+ 奶",150],["18:00","🥄","软烂面 + 西兰花碎 + 鸡肉末 约 120g",0],["21:00","🍼","睡前奶",180] ],
    supp:[ ["维生素 D","400 IU(10 µg)","每天 1 次"] ],
    note:"质地从末到小碎;鼓励自己抓握吃(手指食物);仍不加盐糖、不喂蜂蜜、防噎。" },

  { id:"m12", band:"7–12 月 · 加辅食", t:"12 月龄", d:"3 餐 + 2 加餐,接近家庭饭",
    ov:[["~500","mL 总奶"],["3","正餐"],["2","加餐"]],
    tl:[ ["07:00","🍳","燕麦奶糊(奶 180mL + 燕麦)+ 蒸蛋 1 个",0],["10:00","🍎","蓝莓几颗 / 苹果泥",0],["12:00","🍚","软米饭 + 番茄炒蛋 + 清蒸鳕鱼一小块 约 100g",0],["15:00","🥛","酸奶 100g + 全麦小饼",0],["18:00","🍽️","南瓜软饭 + 豆腐 + 青菜",0],["21:00","🍼","睡前奶",150] ],
    supp:[ ["维生素 D","400 IU(10 µg)","每天 1 次"] ],
    note:"奶退居加餐,正餐为主;别让奶/零食挤掉正餐;2 岁前不刻意限脂。" },

  { id:"y15", band:"1–3 岁 · 家庭饭", t:"1.5 岁", d:"3 正餐 + 2 加餐",
    ov:[["~500","mL 总奶"],["3","正餐"],["2","加餐"]],
    tl:[ ["07:30","🍳","牛奶 200mL + 全麦面包 1 片 + 煎蛋",0],["09:30","🍎","香蕉 半根",0],["12:00","🍚","米饭小半碗 + 番茄牛肉 + 清炒西兰花",0],["15:30","🥛","酸奶 100g + 草莓几颗",0],["18:00","🍽️","软面条 + 鸡肉 + 胡萝卜",0],["20:30","🍼","睡前奶(可选)",150] ],
    supp:[ ["维生素 D","400 IU(10 µg)","每天 1 次"] ],
    note:"和家人同桌吃、口味清淡;鼓励自主进食,不追喂。" },

  { id:"y2", band:"1–3 岁 · 家庭饭", t:"2 岁", d:"家庭均衡膳食",
    ov:[["~450","mL 总奶"],["3","正餐"],["1–2","加餐"]],
    tl:[ ["07:30","🍳","小米粥 + 鸡蛋 1 个 + 牛奶 200mL",0],["10:00","🍎","苹果 半个",0],["12:00","🍚","米饭 + 清蒸鱼 + 西兰花 + 豆腐汤",0],["15:30","🥛","牛奶",150],["18:00","🍽️","软饭 + 番茄炒蛋 + 菠菜",0] ],
    supp:[ ["维生素 D","400 IU(10 µg)","每天 1 次"] ],
    note:"开始限添加糖和钠;每天蛋白质来源换着吃(肉/鱼/蛋/豆)。" },

  { id:"y3", band:"1–3 岁 · 家庭饭", t:"3 岁", d:"基本随家吃,重均衡",
    ov:[["~400","mL 总奶"],["3","正餐"],["1","加餐"]],
    tl:[ ["07:30","🍳","牛奶 200mL + 鸡蛋 + 全麦吐司",0],["12:00","🍚","杂粮饭 + 红烧鸡腿(去皮)+ 炒时蔬",0],["15:30","🥛","酸奶 + 水果",0],["18:00","🍽️","米饭 + 清蒸虾 + 青菜 + 紫菜蛋花汤",0] ],
    supp:[ ["维生素 D","400 IU(10 µg)","每天 1 次"] ],
    note:"种类齐、比例均衡、少糖少盐;好的进食习惯比吃多少更重要。" },
];

function go(id){ document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active")); document.getElementById(id).classList.add("active"); const b=document.querySelector("#"+id+" .scroll"); if(b)b.scrollTop=0; }

// 屏1 列表(按 band 分组)
const list = document.getElementById("list"); let lastBand="";
AGES.forEach(a=>{
  if(a.band!==lastBand){ const h=document.createElement("div"); h.className="band"; h.textContent=a.band; list.appendChild(h); lastBand=a.band; }
  const el=document.createElement("div"); el.className="pick";
  el.innerHTML=`<div><div class="pt">${a.t}</div><div class="pd">${a.d}</div></div><span class="arr">›</span>`;
  el.onclick=()=>openDay(a); list.appendChild(el);
});

const BAND = { m1:0,m3:0,m6:0, m9:1,m12:1, y15:2,y2:2,y3:2 };
const NUTR = [
  [ ["能量","90","kcal/kg"],["蛋白质","9","g"],["钙","200","mg"],["铁","0.3","mg"],["锌","2.0","mg"],["碘","85","µg"],["维生素 A","300","µgRAE"],["维生素 D","10","µg(400IU)"],["维生素 C","40","mg"],["DHA","100","mg"] ],
  [ ["能量","80","kcal/kg"],["蛋白质","17","g"],["钙","250","mg"],["铁","10","mg"],["锌","3.5","mg"],["碘","115","µg"],["维生素 A","350","µgRAE"],["维生素 D","10","µg(400IU)"],["维生素 C","40","mg"],["DHA","100","mg"] ],
  [ ["能量","900–1100","kcal"],["蛋白质","25","g"],["钙","600","mg"],["铁","9","mg"],["锌","4.0","mg"],["碘","90","µg"],["维生素 A","310","µgRAE"],["维生素 D","10","µg(400IU)"],["维生素 C","40","mg"],["DHA","100","mg"] ],
];
const COVER = {
  m1:"这阶段营养全部来自母乳 / 配方奶,额外只需补维生素 D。",
  m3:"同 1 月:奶提供全部能量和营养,维生素 D 靠补剂。",
  m6:"奶仍供大部分;<b>铁</b>开始靠强化铁米粉补,<b>维 D</b>靠补剂。",
  m9:"<b>能量/蛋白</b>:奶+肉末+蛋黄　<b>铁</b>:强化米粉+瘦肉　<b>钙</b>:奶　<b>DHA</b>:蛋黄/鱼　<b>维 D</b>:补剂。",
  m12:"<b>蛋白</b>:蛋/鱼/豆腐　<b>铁</b>:红肉/蛋黄　<b>钙</b>:奶/酸奶　<b>维 C</b>:果蔬　<b>维 D</b>:补剂。",
  y15:"<b>蛋白</b>:牛肉/鸡/蛋　<b>钙</b>:奶/酸奶　<b>铁</b>:红肉　<b>维 C</b>:草莓/西兰花　<b>维 D</b>:补剂。",
  y2:"<b>蛋白</b>:鱼/蛋　<b>钙</b>:奶　<b>铁</b>:深色菜+肉　<b>维 C</b>:苹果/西兰花　<b>维 D</b>:补剂。",
  y3:"<b>蛋白</b>:虾/鸡腿/蛋　<b>钙</b>:奶/酸奶　<b>铁</b>:杂粮+肉　<b>维 C</b>:时蔬　<b>维 D</b>:补剂。",
};
function openDay(a){
  const tl = a.tl.map(([t,ic,txt,ml])=>`<div class="tlr"><div class="tt">${t}</div><div class="td"><span class="ic">${ic}</span>${txt}${ml?`<span class="ml">${ml} mL</span>`:""}</div></div>`).join("");
  const supp = a.supp.map(([n,d,w])=>`<div class="sr"><span>💊</span><div><b>${n} · ${d}</b><div style="font-size:12px;color:#5E7488;margin-top:2px">${w}</div></div></div>`).join("");
  document.getElementById("dayBody").innerHTML = `
    <div class="hello">${a.band}</div><h2>${a.t} · 示范的一天</h2>
    <div class="sub" style="margin:2px 2px 14px">这个月龄典型的一天,照着按需调整即可。</div>
    <div class="ov">${a.ov.map(([v,l])=>`<div class="ovc"><div class="v">${v}</div><div class="l">${l}</div></div>`).join("")}</div>
    <div class="sechead">一天作息</div>
    <div class="tl">${tl}</div>
    <div class="sechead">补充剂</div>
    <div class="supp"><div class="sh">每天要补的</div>${supp}</div>
    <div class="sechead">这一天的营养覆盖</div>
    <div class="covbox">${COVER[a.id]}</div>
    <div class="sechead">这阶段每日营养目标 <span style="font-size:11px;font-weight:400;color:#AEBAB4">RNI 推荐 · AI 适宜</span></div>
    <div class="ncard">${NUTR[BAND[a.id]].map(([n,v,u])=>`<div class="nr"><div class="nn">${n}</div><div class="nv">${v}<span class="nu">${u}</span></div></div>`).join("")}<div class="trace">据:中国 DRIs 2023(数值待官方核对)</div></div>
    <div class="note">${a.note}</div>`;
  go('day');
}
</script>
</body>
</html>
